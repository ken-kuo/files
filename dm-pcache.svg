<svg viewBox="0 0 1400 1150" xmlns="http://www.w3.org/2000/svg" style="background-color: #f4f6f9; font-family: 'Consolas', 'Courier New', monospace, sans-serif;">
    <defs>
        <marker id="ptr-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#455a64" />
        </marker>
        <marker id="data-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2" />
        </marker>
        <marker id="flush-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e64a19" />
        </marker>
        <marker id="map-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#d32f2f" />
        </marker>
    </defs>

    <rect x="20" y="20" width="1360" height="520" rx="15" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
    <text x="40" y="50" font-size="24" font-weight="bold" fill="#0d47a1" font-family="Arial">RAM (Volatile Memory)</text>

    <rect x="20" y="560" width="1360" height="560" rx="15" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
    <text x="40" y="595" font-size="24" font-weight="bold" fill="#e65100" font-family="Arial">PMem / CXL (Non-Volatile Persistent Memory - DAX)</text>

    <line x1="20" y1="550" x2="1380" y2="550" stroke="#78909c" stroke-width="4" stroke-dasharray="12, 8" />
    <text x="580" y="545" font-size="16" fill="#546e7a" font-weight="bold" font-family="Arial">Direct Memory Access (DMA) Boundary</text>

    <rect x="1050" y="30" width="310" height="120" rx="5" fill="#ffffff" stroke="#cfd8dc" stroke-width="1"/>
    <text x="1060" y="50" font-size="14" font-weight="bold" fill="#000">Legend:</text>
    <line x1="1060" y1="70" x2="1100" y2="70" stroke="#455a64" stroke-width="2" marker-end="url(#ptr-arrow)"/>
    <text x="1110" y="74" font-size="12" fill="#333">Struct Pointer / Reference</text>
    <line x1="1060" y1="90" x2="1100" y2="90" stroke="#1976d2" stroke-width="3" marker-end="url(#data-arrow)"/>
    <text x="1110" y="94" font-size="12" fill="#1976d2" font-weight="bold">Lockless Data Write (copy_mc_to_kernel)</text>
    <line x1="1060" y1="110" x2="1100" y2="110" stroke="#e64a19" stroke-width="3" marker-end="url(#flush-arrow)"/>
    <text x="1110" y="114" font-size="12" fill="#e64a19" font-weight="bold">Metadata Flush (Kset Append)</text>
    <line x1="1060" y1="130" x2="1100" y2="130" stroke="#d32f2f" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#map-arrow)"/>
    <text x="1110" y="134" font-size="12" fill="#d32f2f" font-weight="bold">Logical LBA -> PMem Mapping</text>

    <rect x="40" y="70" width="260" height="50" rx="5" fill="#ffffff" stroke="#1976d2" stroke-width="2"/>
    <text x="50" y="90" font-size="14" font-weight="bold">struct dm_pcache</text>
    <text x="50" y="110" font-size="12" fill="#555">+ struct pcache_cache cache;</text>

    <rect x="40" y="150" width="1320" height="370" rx="5" fill="#ffffff" stroke="#1976d2" stroke-width="2"/>
    <rect x="40" y="150" width="1320" height="25" fill="#1976d2" rx="5"/>
    <text x="50" y="167" font-size="14" font-weight="bold" fill="#fff">struct pcache_cache (Core Engine)</text>

    <rect x="50" y="190" width="280" height="310" rx="5" fill="#f5f5f5" stroke="#b0bec5" stroke-width="1"/>
    <text x="60" y="210" font-size="14" font-weight="bold">1. Space Management</text>
    
    <rect x="60" y="225" width="260" height="40" fill="#fff" stroke="#cfd8dc"/>
    <text x="65" y="240" font-size="12" font-weight="bold">unsigned long *seg_map;</text>
    <text x="65" y="255" font-size="12" fill="#4caf50">Bitmap: [ 1 | 0 | 1 | 1 | 0 | ... ]</text>

    <rect x="60" y="275" width="260" height="210" fill="#fff" stroke="#cfd8dc"/>
    <text x="65" y="290" font-size="12" font-weight="bold">struct pcache_cache_segment *segments;</text>
    
    <rect x="70" y="300" width="240" height="85" fill="#e8eaf6" stroke="#9fa8da"/>
    <text x="75" y="315" font-size="12" font-weight="bold">segments[0] (Log Seg)</text>
    <text x="75" y="330" font-size="12">u32 cache_seg_id = 0;</text>
    <text x="75" y="345" font-size="12">atomic_t refs = 1;</text>
    <text x="75" y="360" font-size="12">u64 gen = 2; <tspan fill="#757575">// Generation</tspan></text>
    <text x="75" y="375" font-size="12">struct pcache_segment segment;</text>

    <rect x="70" y="390" width="240" height="85" fill="#e8eaf6" stroke="#9fa8da"/>
    <text x="75" y="405" font-size="12" font-weight="bold">segments[1] (Data Seg)</text>
    <text x="75" y="420" font-size="12">u32 cache_seg_id = 1;</text>
    <text x="75" y="435" font-size="12">atomic_t refs = 5;</text>
    <text x="75" y="450" font-size="12">u64 gen = 1;</text>
    <text x="75" y="465" font-size="12">struct pcache_segment segment;</text>

    <rect x="345" y="190" width="370" height="310" rx="5" fill="#f5f5f5" stroke="#b0bec5" stroke-width="1"/>
    <text x="355" y="210" font-size="14" font-weight="bold">2. RB-Tree Index Engine (Hot Path)</text>
    <text x="355" y="225" font-size="12" font-weight="bold">struct pcache_cache_tree req_key_tree;</text>

    <rect x="355" y="235" width="350" height="250" fill="#fff" stroke="#cfd8dc"/>
    <text x="360" y="250" font-size="12" font-weight="bold">subtrees[0] (LBA 0 ~ 4MB)</text>
    <text x="360" y="265" font-size="12">spinlock_t tree_lock;</text>
    <text x="360" y="280" font-size="12">struct rb_root root;</text>

    <rect x="380" y="295" width="310" height="180" fill="#e8f5e9" stroke="#81c784" rx="5"/>
    <text x="390" y="315" font-size="12" font-weight="bold">struct pcache_cache_key (Node)</text>
    <text x="390" y="335" font-size="12">u64 off = 0x1000; <tspan fill="#d32f2f">// Logical Block Address</tspan></text>
    <text x="390" y="355" font-size="12">u32 len = 4096;   <tspan fill="#d32f2f">// 4KB Size</tspan></text>
    <text x="390" y="375" font-size="12">u64 seg_gen = 1;  <tspan fill="#757575">// Valid against seg[1].gen</tspan></text>
    
    <rect x="390" y="390" width="290" height="75" fill="#c8e6c9" stroke="#4caf50"/>
    <text x="400" y="405" font-size="12" font-weight="bold">struct pcache_cache_pos cache_pos;</text>
    <text x="400" y="425" font-size="12">struct pcache_cache_segment *cache_seg;</text>
    <text x="400" y="445" font-size="12">u32 seg_off = 0x1000; <tspan fill="#757575">// Offset: 4KB</tspan></text>
    
    <path d="M 400 420 L 310 420" fill="none" stroke="#455a64" stroke-width="2" marker-end="url(#ptr-arrow)"/>

    <rect x="730" y="190" width="290" height="310" rx="5" fill="#f5f5f5" stroke="#b0bec5" stroke-width="1"/>
    <text x="740" y="210" font-size="14" font-weight="bold">3. Per-CPU Data Heads (Lockless Write)</text>
    <text x="740" y="225" font-size="12" font-weight="bold">struct pcache_cache_data_head *data_heads;</text>

    <rect x="740" y="240" width="270" height="110" fill="#fff" stroke="#cfd8dc"/>
    <text x="750" y="255" font-size="12" font-weight="bold">__percpu data_heads [CPU 0]</text>
    <rect x="750" y="270" width="250" height="70" fill="#fff3e0" stroke="#ffb74d"/>
    <text x="760" y="285" font-size="12" font-weight="bold">struct pcache_cache_pos head_pos;</text>
    <text x="760" y="305" font-size="12">struct pcache_cache_segment *cache_seg;</text>
    <text x="760" y="325" font-size="12">u32 seg_off = 0x2000; <tspan fill="#757575">// Next free: 8K</tspan></text>

    <path d="M 760 300 C 680 200, 310 200, 310 395" fill="none" stroke="#455a64" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#ptr-arrow)"/>

    <rect x="740" y="360" width="270" height="50" fill="#fff" stroke="#cfd8dc"/>
    <text x="750" y="375" font-size="12" font-weight="bold">__percpu data_heads [CPU 1]</text>
    <text x="750" y="395" font-size="12" fill="#757575">... pointing to Segment 2 ...</text>

    <rect x="1035" y="190" width="315" height="310" rx="5" fill="#f5f5f5" stroke="#b0bec5" stroke-width="1"/>
    <text x="1045" y="210" font-size="14" font-weight="bold">4. Multiqueue Metadata Log</text>
    <text x="1045" y="225" font-size="12" font-weight="bold">struct pcache_cache_kset *ksets;</text>

    <rect x="1045" y="240" width="295" height="200" fill="#fff" stroke="#cfd8dc"/>
    <text x="1055" y="255" font-size="12" font-weight="bold">ksets[0] (Assigned to Subtree 0)</text>
    <text x="1055" y="270" font-size="12">spinlock_t kset_lock;</text>
    <text x="1055" y="285" font-size="12">struct delayed_work flush_work;</text>

    <rect x="1055" y="300" width="275" height="130" fill="#f3e5f5" stroke="#ba68c8"/>
    <text x="1065" y="315" font-size="12" font-weight="bold">struct pcache_cache_kset_onmedia</text>
    <text x="1065" y="335" font-size="12">__u32 key_num = 1;</text>
    <rect x="1065" y="350" width="255" height="70" fill="#e1bee7" stroke="#ab47bc"/>
    <text x="1070" y="365" font-size="12" font-weight="bold">data[0]: pcache_cache_key_onmedia</text>
    <text x="1070" y="385" font-size="12">off=0x1000, len=4096, seg_gen=1</text>
    <text x="1070" y="405" font-size="12">cache_seg_id=1, cache_seg_off=0x1000</text>


    <rect x="40" y="620" width="340" height="230" rx="5" fill="#ffffff" stroke="#f57c00" stroke-width="2"/>
    <rect x="40" y="620" width="340" height="25" fill="#f57c00" rx="5"/>
    <text x="50" y="637" font-size="14" font-weight="bold" fill="#fff">Global Superblock / Control Area</text>
    
    <rect x="50" y="660" width="320" height="80" fill="#fff" stroke="#cfd8dc"/>
    <text x="55" y="675" font-size="12" font-weight="bold">struct pcache_cache_info [Double Buffered]</text>
    <text x="55" y="695" font-size="12">struct pcache_meta_header header (seq=5, crc=...)</text>
    <text x="55" y="715" font-size="12">u32 flags (CACHE_MODE_WRITEBACK | GC=70)</text>
    <text x="55" y="730" font-size="12">u32 n_segs = 65536;</text>

    <rect x="50" y="755" width="320" height="85" fill="#fff" stroke="#cfd8dc"/>
    <text x="55" y="770" font-size="12" font-weight="bold">struct pcache_cache_ctrl [Double Buffered]</text>
    <text x="55" y="785" font-size="12">struct pcache_meta_header header</text>
    <text x="55" y="805" font-size="12">struct pcache_cache_pos_onmedia key_tail_pos;</text>
    <text x="55" y="825" font-size="12">struct pcache_cache_pos_onmedia dirty_tail_pos;</text>


    <rect x="1000" y="620" width="360" height="490" rx="5" fill="#ffffff" stroke="#f57c00" stroke-width="2"/>
    <rect x="1000" y="620" width="360" height="25" fill="#f57c00" rx="5"/>
    <text x="1010" y="637" font-size="14" font-weight="bold" fill="#fff">Physical Segment 0 (Metadata Log Area)</text>

    <rect x="1010" y="660" width="340" height="80" fill="#eeeeee" stroke="#9e9e9e"/>
    <text x="1015" y="675" font-size="12" font-weight="bold">Header: struct pcache_segment_info</text>
    <text x="1015" y="695" font-size="12">struct pcache_meta_header header (seq=12, crc=...)</text>
    <text x="1015" y="715" font-size="12">__u32 flags (PCACHE_SEG_INFO_FLAGS_HAS_NEXT)</text>
    <text x="1015" y="730" font-size="12">__u32 next_seg = 3;</text>

    <rect x="1010" y="760" width="340" height="150" fill="#f3e5f5" stroke="#ba68c8" stroke-width="2"/>
    <text x="1020" y="775" font-size="12" font-weight="bold">Data Area: Flushed pcache_cache_kset_onmedia</text>
    <text x="1020" y="795" font-size="12">__u32 crc = 0x8A9C...</text>
    <text x="1020" y="810" font-size="12">__u64 magic = PCACHE_KSET_MAGIC</text>
    <text x="1020" y="825" font-size="12">__u32 key_num = 1;</text>
    <rect x="1020" y="835" width="320" height="65" fill="#e1bee7" stroke="#ab47bc"/>
    <text x="1025" y="850" font-size="12" font-weight="bold">data[0]: pcache_cache_key_onmedia</text>
    <text x="1025" y="865" font-size="12">off=0x1000, len=4096, seg_gen=1</text>
    <text x="1025" y="885" font-size="12" fill="#d32f2f" font-weight="bold">cache_seg_id=1, cache_seg_off=0x1000</text>
    
    <text x="1010" y="940" font-size="12" fill="#9e9e9e" font-style="italic">[ ... Empty Space for next Kset append ... ]</text>


    <rect x="420" y="620" width="540" height="490" rx="5" fill="#ffffff" stroke="#f57c00" stroke-width="2"/>
    <rect x="420" y="620" width="540" height="25" fill="#f57c00" rx="5"/>
    <text x="430" y="637" font-size="14" font-weight="bold" fill="#fff">Physical Segment 1 (User Data Payload Area)</text>

    <rect x="430" y="660" width="520" height="60" fill="#eeeeee" stroke="#9e9e9e"/>
    <text x="435" y="675" font-size="12" font-weight="bold">Header: struct pcache_segment_info</text>
    <text x="435" y="695" font-size="12">struct pcache_meta_header header (seq=1, crc=...)</text>
    <text x="435" y="710" font-size="12">__u32 flags (PCACHE_SEGMENT_TYPE_CACHE_DATA)</text>

    <text x="430" y="740" font-size="12" font-weight="bold">Segment Data Area (16MB Total):</text>
    
    <rect x="430" y="750" width="520" height="50" fill="#eceff1" stroke="#b0bec5"/>
    <text x="440" y="770" font-size="12" fill="#546e7a">Offset 0x0000 ~ 0x0FFF (4KB)</text>
    <text x="440" y="785" font-size="12" fill="#546e7a">Previously written Payload Data...</text>

    <rect x="430" y="810" width="520" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="440" y="830" font-size="14" font-weight="bold" fill="#0d47a1" id="pmem_data_target">Offset 0x1000 ~ 0x1FFF (4KB)</text>
    <text x="440" y="855" font-size="12" fill="#000">Raw Data Payload for LBA 0x1000</text>
    <text x="440" y="875" font-size="12" fill="#000">(Directly mapped via DAX, written by CPU 0)</text>

    <rect x="430" y="900" width="520" height="80" fill="#ffffff" stroke="#e0e0e0" stroke-dasharray="4,4"/>
    <text x="440" y="920" font-size="14" font-weight="bold" fill="#9e9e9e" id="pmem_empty_target">Offset 0x2000 ~ 16MB</text>
    <text x="440" y="945" font-size="12" fill="#9e9e9e">Available Empty Space</text>
    <text x="440" y="960" font-size="12" fill="#9e9e9e">(Waiting for CPU 0's next Lockless Write...)</text>


    <path d="M 545 450 L 545 530 L 400 530 L 400 850 L 430 850" fill="none" stroke="#d32f2f" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#map-arrow)"/>
    <text x="410" y="525" font-size="12" font-weight="bold" fill="#d32f2f">Cache Hit: LBA Lookup maps directly to physical DAX offset</text>

    <path d="M 885 330 L 980 330 L 980 940 L 950 940" fill="none" stroke="#1976d2" stroke-width="3" marker-end="url(#data-arrow)"/>
    <text x="985" y="470" font-size="12" font-weight="bold" fill="#1976d2" transform="rotate(90, 985, 470)">copy_mc_to_kernel (Lockless Append)</text>

    <path d="M 1200 420 L 1200 760" fill="none" stroke="#e64a19" stroke-width="3" marker-end="url(#flush-arrow)"/>
    <text x="1210" y="525" font-size="12" font-weight="bold" fill="#e64a19">Flush Workqueue</text>
    <text x="1210" y="540" font-size="12" fill="#e64a19">Persist RAM Kset to PMem Log</text>

    <path d="M 370 820 L 400 820 L 400 1060 L 1180 1060 L 1180 1110" fill="none" stroke="#f57c00" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ptr-arrow)"/>
    <text x="410" y="1050" font-size="12" fill="#f57c00" font-weight="bold">key_tail_pos points to the oldest valid Kset Segment</text>

    <path d="M 1150 760 L 1150 420" fill="none" stroke="#8e24aa" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ptr-arrow)"/>
    <text x="1000" y="515" font-size="12" font-weight="bold" fill="#8e24aa">cache_replay: Rebuild RB-Tree on Boot</text>

</svg>